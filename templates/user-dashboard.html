<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - My Orders</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --primary-dark: #3a56d4;
            --secondary: #7209b7;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --info: #17a2b8;
            --light: #f8f9fa;
            --dark: #212529;
            --gray: #6c757d;
            --light-gray: #e9ecef;
            --border: #dee2e6;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Poppins", "Inter", "SF Pro Display", "Segoe UI", "Manrope", sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e7ec 100%);
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        /* Navigation Styles */
        ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            height: 50px;
        }
        
        li {
            float: left;
        }
        
        li a, .dropbtn {
            display: inline-block;
            color: white;
            text-align: center;
            padding: 10px 14px;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 14px;
            height: 50px;
            line-height: 30px;
        }
        
        li a:hover, .dropdown:hover .dropbtn {
            background-color: var(--dark);
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }
        
        .dashboard-header {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            margin-bottom: 25px;
        }
        
        .user-welcome {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .user-info-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: var(--card-shadow);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: var(--card-shadow);
            text-align: center;
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: var(--gray);
            font-size: 14px;
        }
        
        .filters {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: var(--card-shadow);
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .filter-label {
            font-weight: 500;
        }
        
        .filter-select, .search-input {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 5px;
            min-width: 150px;
        }
        
        .search-input {
            min-width: 250px;
        }
        
        .refresh-btn {
            background: var(--info);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .refresh-btn:hover {
            background: #138496;
        }
        
        .orders-container {
            background: white;
            border-radius: 10px;
            box-shadow: var(--card-shadow);
            padding: 25px;
            margin-top: 20px;
        }
        
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .orders-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        
        .orders-table th,
        .orders-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        
        .orders-table th {
            background: var(--light);
            font-weight: 600;
            color: var(--dark);
        }
        
        .orders-table tr:hover {
            background: var(--light-gray);
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-pending { background: #fff3cd; color: #856404; }
        .status-confirmed { background: #d1ecf1; color: #0c5460; }
        .status-shipped { background: #d1e7ff; color: #084298; }
        .status-delivered { background: #d4edda; color: #155724; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gray);
        }
        
        .loading i {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            text-align: center;
        }
        
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            text-align: center;
        }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: var(--gray);
            font-style: italic;
        }
        
        .customer-badge {
            background: var(--primary);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            display: inline-block;
            margin-bottom: 5px;
        }

        @media (max-width: 768px) {
            ul {
                height: 50px;
                display: flex;
                flex-wrap: nowrap;
                overflow-x: auto;
                overflow-y: hidden;
                white-space: nowrap;
                -webkit-overflow-scrolling: touch;
                padding: 5px 10px;
                justify-content: flex-start;
            }
            
            li {
                float: none;
                display: inline-flex;
                flex-shrink: 0;
                margin: 0 2px;
            }
            
            li a, .dropbtn {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 8px 12px;
                height: 40px;
                line-height: 1.2;
                font-size: 12px;
                white-space: nowrap;
                border-radius: 6px;
                margin: 0;
            }
            
            .container {
                padding: 15px;
            }
            
            .filters {
                flex-direction: column;
            }
            
            .filter-group {
                width: 100%;
            }
            
            .filter-select, .search-input {
                width: 100%;
            }
            
            .user-welcome {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .orders-table {
                font-size: 14px;
            }
            
            .orders-table th,
            .orders-table td {
                padding: 10px 8px;
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>

    <ul>
    <li><a href="/dashboard"><i class="fas fa-chart-line"></i> Dashboard</a></li>
    </ul>

    <div class="container">
        <!-- Dashboard Header -->
        <div class="dashboard-header">
            <div class="user-welcome">
                <div>
                    <h2><i class="fas fa-user-circle"></i> My Dashboard</h2>
                    <p>Manage and track your customer orders</p>
                </div>
                <div class="user-info-card">
                    <h3 id="userWelcomeName">Welcome, User!</h3>
                    <p id="userWelcomeEmail">Loading...</p>
                </div>
            </div>
        </div>

        <!-- Statistics -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-number" id="totalOrders">0</div>
                <div class="stat-label">Total Orders Placed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingOrders">0</div>
                <div class="stat-label">Pending Orders</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="deliveredOrders">0</div>
                <div class="stat-label">Delivered Orders</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalCustomers">0</div>
                <div class="stat-label">Unique Customers</div>
            </div>
        </div>

        <!-- Filters and Search -->
        <div class="filters">
            <div class="filter-group">
                <span class="filter-label">Status:</span>
                <select class="filter-select" id="statusFilter" onchange="filterOrders()">
                    <option value="all">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="confirmed">Confirmed</option>
                    <option value="shipped">Shipped</option>
                    <option value="delivered">Delivered</option>
                    <option value="cancelled">Cancelled</option>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">Sort by:</span>
                <select class="filter-select" id="sortFilter" onchange="filterOrders()">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="customer">Customer Name</option>
                </select>
            </div>
            <div class="filter-group">
                <input type="text" class="search-input" id="searchOrders" 
                       placeholder="Search by customer name or product..." onkeyup="filterOrders()">
            </div>
            <button class="refresh-btn" onclick="loadUserOrders()">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
        </div>

        <!-- Messages -->
        <div id="messageContainer"></div>

        <!-- Orders Container -->
        <div class="orders-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border);">
                <h3><i class="fas fa-list"></i> My Customer Orders</h3>
                <span id="ordersCount" style="color: var(--gray);">0 orders found</span>
            </div>
            
            <div id="ordersListContainer">
                <div class="loading">
                    <i class="fas fa-spinner"></i> Loading your orders...
                </div>
            </div>
        </div>
    </div>

    <script>
    let allUserOrders = [];
    let filteredUserOrders = [];
    let currentUser = null;
    let refreshInterval = null;

    // Initialize dashboard
    async function initializeUserDashboard() {
        await checkUserAuthStatus();
        await loadMyOrders();
        refreshInterval = setInterval(loadMyOrders, 30000);
    }

    // Check user authentication
    async function checkUserAuthStatus() {
        try {
            // Check both admin and user auth
            const [userResponse, adminResponse] = await Promise.all([
                fetch('/user/check-auth'),
                fetch('/admin/check-auth')
            ]);
            
            const userData = await userResponse.json();
            const adminData = await adminResponse.json();
            
            if (!userData.authenticated && !adminData.authenticated) {
                window.location.href = '/gateway';
                return;
            }
            
            if (adminData.authenticated) {
                // Admin is logged in
                currentUser = {
                    id: adminData.admin_id,
                    name: adminData.user || 'Admin',
                    email: adminData.admin_email || '',
                    type: 'admin'
                };
            } else {
                // Regular user is logged in
                currentUser = {
                    id: userData.user_id,
                    name: userData.user_name,
                    email: userData.user_email,
                    type: 'user'
                };
            }
            
            document.getElementById('userWelcomeName').textContent = `Welcome, ${currentUser.name}!`;
            document.getElementById('userWelcomeEmail').textContent = currentUser.email;
            
        } catch (error) {
            window.location.href = '/gateway';
        }
    }

    // Load orders placed by the currently logged-in person
    async function loadMyOrders() {
        const container = document.getElementById('ordersListContainer');
        container.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i> Loading your orders...</div>';

        try {
            const response = await fetch('/api/my-personal-orders');
            
            if (response.status === 401) {
                window.location.href = '/gateway';
                return;
            }
            
            const data = await response.json();
            
            if (data.success) {
                allUserOrders = data.orders;
                filteredUserOrders = [...allUserOrders];
                displayMyOrders(allUserOrders);
                updateUserStatistics(data.orders);
            } else {
                showMessage(data.message, 'error');
                container.innerHTML = '<div class="no-data">Error loading your orders</div>';
            }
        } catch (error) {
            showMessage('Error loading orders: ' + error.message, 'error');
            container.innerHTML = '<div class="no-data">Error loading your orders</div>';
        }
    }

    // Display personal orders in table
    function displayMyOrders(orders) {
        const container = document.getElementById('ordersListContainer');
        const countElement = document.getElementById('ordersCount');
        
        if (!orders || orders.length === 0) {
            container.innerHTML = '<div class="no-data">No orders placed by you yet. Start placing orders for customers!</div>';
            countElement.textContent = '0 orders found';
            return;
        }

        countElement.textContent = `${orders.length} orders placed by you`;
        
        container.innerHTML = `
            <div class="table-responsive">
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Barcode</th>
                            <th>Product Name</th>
                            <th>Quantity</th>
                            <th>Value</th>
                            <th>Price Method</th>
                            <th>Status</th>
                            <th>Order Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${orders.map(order => {
                            const orderDate = new Date(order.created_at);
                            const formattedDate = orderDate.toLocaleDateString();
                            const formattedTime = orderDate.toLocaleTimeString();
                            
                            return `
                                <tr>
                                    <td><strong>#${order.order_id}</strong></td>
                                    <td>
                                        <div style="display: flex; flex-direction: column; gap: 2px;">
                                            <span class="customer-badge">${order.customer.customer_name}</span>
                                            <small>${order.customer.customer_email}</small>
                                            <small style="color: var(--gray);">${order.customer.customer_mobile}</small>
                                        </div>
                                    </td>
                                    <td><code>${order.barcode}</code></td>
                                    <td><strong>${order.product_name || 'Unknown Product'}</strong></td>
                                    <td>${order.quantity}</td>
                                    <td>₹${order.value}</td>
                                    <td>${order.price_method}</td>
                                    <td>
                                        <span class="status-badge status-${order.status}">
                                            ${order.status.toUpperCase()}
                                        </span>
                                    </td>
                                    <td>
                                        <div>${formattedDate}</div>
                                        <small>${formattedTime}</small>
                                    </td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    // Update user statistics
    function updateUserStatistics(orders) {
        const totalOrders = orders.length;
        const pendingOrders = orders.filter(order => order.status === 'pending').length;
        const deliveredOrders = orders.filter(order => order.status === 'delivered').length;
        
        // Get unique customers you've served
        const uniqueCustomers = new Set(orders.map(order => order.customer.customer_id)).size;

        document.getElementById('totalOrders').textContent = totalOrders;
        document.getElementById('pendingOrders').textContent = pendingOrders;
        document.getElementById('deliveredOrders').textContent = deliveredOrders;
        document.getElementById('totalCustomers').textContent = uniqueCustomers;
    }

    // Filter and search orders
    function filterOrders() {
        const statusFilter = document.getElementById('statusFilter').value;
        const searchTerm = document.getElementById('searchOrders').value.toLowerCase();
        const sortBy = document.getElementById('sortFilter').value;

        let filtered = [...allUserOrders];

        // Apply status filter
        if (statusFilter !== 'all') {
            filtered = filtered.filter(order => order.status === statusFilter);
        }

        // Apply search filter
        if (searchTerm) {
            filtered = filtered.filter(order => 
                order.customer.customer_name.toLowerCase().includes(searchTerm) ||
                order.product_name.toLowerCase().includes(searchTerm) ||
                order.barcode.toLowerCase().includes(searchTerm)
            );
        }

        // Apply sorting
        switch(sortBy) {
            case 'newest':
                filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                break;
            case 'oldest':
                filtered.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
                break;
            case 'customer':
                filtered.sort((a, b) => a.customer.customer_name.localeCompare(b.customer.customer_name));
                break;
        }

        filteredUserOrders = filtered;
        displayMyOrders(filteredUserOrders);
    }

    // Show message
    function showMessage(message, type) {
        const container = document.getElementById('messageContainer');
        container.innerHTML = `
            <div class="${type === 'error' ? 'error-message' : 'success-message'}">
                <i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i>
                ${message}
            </div>
        `;
        
        setTimeout(() => {
            container.innerHTML = '';
        }, 5000);
    }

    // User logout
    async function userLogout() {
        try {
            // Call appropriate logout based on user type
            if (currentUser.type === 'admin') {
                await fetch('/admin/logout', { method: 'POST' });
            } else {
                await fetch('/user/logout', { method: 'POST' });
            }
            window.location.href = '/gateway';
        } catch (error) {
            window.location.href = '/gateway';
        }
    }

    // Initialize when page loads
    document.addEventListener('DOMContentLoaded', initializeUserDashboard);
    window.addEventListener('beforeunload', () => {
        if (refreshInterval) clearInterval(refreshInterval);
    });
</script>
</body>
</html>
