<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Gateway - Order Management System PCS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --primary-dark: #3a56d4;
            --secondary: #7209b7;
            --success: #06d6a0;
            --danger: #ef476f;
            --warning: #ffd166;
            --light: #f8f9fa;
            --dark: #212529;
            --gray: #6c757d;
            --light-gray: #e9ecef;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Poppins", "Inter", "SF Pro Display", "Segoe UI", "Manrope", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .gateway-container {
            background: white;
            padding: 30px 25px;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            text-align: center;
            max-width: 380px;
            width: 100%;
        }

        .gateway-icon {
            font-size: 36px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gateway-subtitle {
            font-size: 14px;
            color: var(--gray);
            margin-bottom: 25px;
            font-weight: 400;
        }

        .option-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px 20px;
            margin: 12px 0;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: "Poppins", sans-serif;
        }

        .option-btn i {
            margin-right: 10px;
            font-size: 16px;
        }

        .admin-btn {
            background: var(--danger);
            color: white;
        }

        .user-btn {
            background: var(--primary);
            color: white;
        }

        .option-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .admin-btn:hover {
            background: #c82333;
        }

        .user-btn:hover {
            background: var(--primary-dark);
        }

        .gateway-footer {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid var(--light-gray);
            color: var(--gray);
            font-size: 12px;
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .gateway-container {
                padding: 25px 20px;
            }
            
            h1 {
                font-size: 22px;
            }
            
            .gateway-subtitle {
                font-size: 13px;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="gateway-container">
        <div class="gateway-icon">
            <i class="fas fa-shield-alt"></i>
        </div>
        
        <h1>Order Management System PCS</h1>
        <p class="gateway-subtitle">Choose your login type to continue</p>
        
        <button class="option-btn admin-btn" onclick="selectAdmin()">
            <i class="fas fa-crown"></i>
            Admin Access
        </button>
        
        <button class="option-btn user-btn" onclick="selectUser()">
            <i class="fas fa-user"></i>
            User Access
        </button>
        
        <div class="gateway-footer">
            <p>&copy; 2025 Order Management System PCS</p>
        </div>
    </div>

    <script>
        function selectAdmin() {
            window.location.href = '/admin';
        }

        function selectUser() {
            window.location.href = '/user-login';
        }
    </script>
    
    <script src="{{ url_for('static', filename='js/navigation.js') }}"></script>
</body>
</html>
