<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Registration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --primary-dark: #3a56d4;
            --secondary: #7209b7;
            --light: #f8f9fa;
            --dark: #212529;
            --gray: #6c757d;
            --light-gray: #e9ecef;
            --border: #dee2e6;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Poppins", "Inter", "SF Pro Display", "Segoe UI", "Manrope", sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e7ec 100%);
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        /* SMALLER Navigation Styles - Consistent with home page but smaller */
        ul {
            list-style: none;
            background: var(--primary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            padding: 2px 10px;
            min-height: 30px; 
            height: auto;
            line-height: 1;
        }
        
        li {
            display: inline-flex;
            flex-shrink: 0;
        }
        
        li a, .dropbtn {
            display: flex;
            align-items: center;
            color: white;
            text-decoration: none;
            padding: 6px 10px; /* was 10px 14px */
            font-size: 13px;   /* was 14px */
            font-weight: 500;  /* bold style restored */
            white-space: nowrap;
            transition: all 0.3s ease;
            border-radius: 6px;
            height: auto;
            line-height: 1.2;
        }
        
        li a:hover, .dropdown:hover .dropbtn {
            background-color: var(--dark);
        }
        
        li.dropdown {
            position: relative;
        }
        
        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: white;
            min-width: 180px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            z-index: 1;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .dropdown-content a {
            color: var(--dark);
            padding: 10px 14px;
            text-decoration: none;
            display: block;
            font-size: 13px;
            transition: all 0.3s ease;
        }
        
        .dropdown-content a:hover {
            background-color: var(--light-gray);
            color: var(--primary);
        }
        
        .dropdown:hover .dropdown-content {
            display: block;
        }

        /* Your existing customer registration styles */
        .container {
            max-width: 1000px;
            margin: 30px auto; /* Reduced margin */
            padding: 0 20px;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
        }
        
        h2 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 600;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        label i {
            color: var(--primary);
            font-size: 16px;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--light-gray);
            border-radius: 10px;
            font-size: 16px;
            background-color: var(--light);
            transition: all 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
        }
        
        .required::after {
            content: " *";
            color: #ef476f;
        }
        
        .optional {
            color: var(--gray);
            font-style: italic;
            font-size: 12px;
            margin-left: 5px;
        }
        
        .full-width {
            grid-column: 1 / -1;
        }
        
        button {
            background: var(--primary);
            color: white;
            padding: 16px 32px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            width: 100%;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        
        button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(67, 97, 238, 0.3);
        }

        .error-message {
            color: #ef476f;
            font-size: 12px;
            margin-top: 5px;
        }

        .success-message {
            color: #06d6a0;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            padding: 10px;
            background: #f8fff9;
            border-radius: 8px;
            border: 1px solid #06d6a0;
            display: none;
        }

        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            /* Mobile Navigation - Single Line Horizontal Scroll */
            ul {
                height: 50px;
                display: flex;
                flex-wrap: nowrap;
                overflow-x: auto;
                overflow-y: hidden;
                white-space: nowrap;
                -webkit-overflow-scrolling: touch;
                padding: 5px 10px;
                justify-content: flex-start;
            }
            
            li {
                float: none;
                display: inline-flex;
                flex-shrink: 0;
                margin: 0 2px;
            }
            
            li a, .dropbtn {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 8px 12px;
                height: 40px;
                line-height: 1.2;
                font-size: 12px;
                white-space: nowrap;
                border-radius: 6px;
                margin: 0;
            }
            
            .dropdown-content {
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: white;
                box-shadow: var(--card-shadow);
                border-radius: 0 0 8px 8px;
                display: none;
            }
            
            .dropdown:hover .dropdown-content {
                display: block;
            }
            
            .dropdown-content a {
                padding: 10px 15px;
                text-align: center;
                background: white;
                color: var(--dark);
            }

            /* Form Mobile Styles */
            .container {
                margin: 20px auto;
                padding: 15px;
            }
            
            h2 {
                font-size: 24px;
                margin-bottom: 25px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .form-group {
                margin-bottom: 15px;
            }
            
            label {
                font-size: 14px;
                margin-bottom: 6px;
            }
            
            input[type="text"],
            input[type="email"],
            input[type="tel"],
            input[type="password"] {
                padding: 12px 14px;
                font-size: 16px;
                border-width: 1px;
            }
            
            button {
                padding: 14px 24px;
                font-size: 16px;
                margin-top: 15px;
            }
            
            .optional {
                font-size: 11px;
            }
            
            .error-message {
                font-size: 11px;
            }
            
            input, button {
                min-height: 44px;
            }

            .success-message {
                font-size: 13px;
                padding: 8px;
            }

            .password-strength {
                font-size: 11px;
            }
        }

        @media (max-width: 480px) {
            .container {
                margin: 10px auto;
                padding: 10px;
            }
            
            h2 {
                font-size: 22px;
                margin-bottom: 20px;
            }
            
            .form-grid {
                gap: 12px;
            }
            
            .form-group {
                margin-bottom: 12px;
            }
            
            input[type="text"],
            input[type="email"],
            input[type="tel"],
            input[type="password"] {
                padding: 10px 12px;
                font-size: 15px;
            }
            
            button {
                padding: 12px 20px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Consistent Navigation Bar - Smaller version -->
    <ul>
        <li><a href="/"><i class="fas fa-home"></i> Home</a></li>
        <li class="dropdown">
            <a href="/dashboard" class="dropbtn"><i class="fas fa-chart-line"></i> Dashboard</a>
            <div class="dropdown-content">
                <a href="/dashboard"><i class="fas fa-chart-bar"></i> Dashboard Results</a>
                <a href="/Top-Moving-Products"><i class="fas fa-arrow-up"></i> Top Moving Products</a>
                <a href="/Slow-Moving-Products"><i class="fas fa-arrow-down"></i> Slow Moving Products</a>
                <a href="/Non-Moving-Products"><i class="fas fa-ban"></i> Non Moving Products</a>
            </div>
        </li>
        <li><a href="/configurations"><i class="fas fa-cogs"></i> Configurations</a></li>
        <li><a href="/dataimport"><i class="fas fa-file-import"></i> Data-Import</a></li>
        <li><a href="/inventory"><i class="fas fa-warehouse"></i> Inventory</a></li>
        <li><a href="/customers"><i class="fas fa-users"></i> Customers</a></li>
        <li><a href="/orders"><i class="fas fa-shopping-cart"></i> Orders</a></li>
        <li><a href="/admin-dashboard"><i class="fas fa-chart-line"></i> Admin-Dashboard</a></li>
        <li><a href="/user-registration"><i class="fas fa-users"></i> User</a></li>
        <li><a href="/admin-registration"><i class="fas fa-users"></i> Admin</a></li>
    </ul>

    <div class="container">
        <h2><i class="fas fa-user-plus"></i> Customer Registration</h2>
        
        <!-- Success Message -->
        <div id="successMessage" class="success-message"></div>
        
        <form id="customerForm" autocomplete="off">
            <div class="form-grid">
                <!-- Required Fields -->
                <div class="form-group full-width">
                    <label class="required"><i class="fas fa-user"></i> Customer Name</label>
                    <input type="text" placeholder="Enter the name" name="customer_name" required>
                </div>

                <div class="form-group">
                    <label class="required"><i class="fas fa-map-marker-alt"></i> Address Line 1</label>
                    <input type="text" placeholder="Enter the address" name="address1" required>
                </div>

                <div class="form-group">
                    <label class="required"><i class="fas fa-location-dot"></i> Location</label>
                    <input type="text" placeholder="Enter the area_name" name="location" required>
                </div>

                <div class="form-group">
                    <label class="required"><i class="fas fa-city"></i> City</label>
                    <input type="text" placeholder="Enter the City" name="city" required>
                </div>

                <div class="form-group">
                    <label class="required"><i class="fas fa-building"></i> State</label>
                    <input type="text" placeholder="Enter the State" name="state" required>
                </div>

                <div class="form-group">
                    <label class="required"><i class="fas fa-globe"></i> Country</label>
                    <input type="text" placeholder="Enter the Country Name" name="country" value="India">
                </div>

                <div class="form-group">
                    <label class="required"><i class="fas fa-map-pin"></i> Pincode</label>
                    <input type="text" placeholder="Enter the PinCode" name="pincode" required maxlength="6">
                </div>

                <div class="form-group">
                    <label class="required"><i class="fas fa-mobile-alt"></i> Mobile 1</label>
                    <input type="tel" placeholder="Enter the MobileNo" name="mobile1" required maxlength="10">
                </div>

                <div class="form-group">
                    <label class="required"><i class="fas fa-envelope"></i> Email ID 1</label>
                    <input type="email" placeholder="Enter the EmailId" name="emailid1" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-map-marker"></i> Address Line 2 <span class="optional">(optional)</span></label>
                    <input type="text" name="address2" placeholder="Additional address line">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-map-marker"></i> Address Line 3 <span class="optional">(optional)</span></label>
                    <input type="text" name="address3" placeholder="Additional address line">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-mobile"></i> Mobile 2 <span class="optional">(optional)</span></label>
                    <input type="tel" name="mobile2" placeholder="Alternative mobile number" maxlength="10">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Telephone 1 <span class="optional">(optional)</span></label>
                    <input type="tel" name="ph1" placeholder="Landline number" maxlength="12">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Telephone 2 <span class="optional">(optional)</span></label>
                    <input type="tel" name="ph2" placeholder="Alternative landline" maxlength="12">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email ID 2 <span class="optional">(optional)</span></label>
                    <input type="email" name="emailid2" placeholder="Alternative email address">
                </div>
            </div>
            <button type="submit"><i class="fas fa-user-plus"></i> Register Customer</button>
        </form>
    </div>

    <script>
        // Auto-format phone numbers
        document.querySelectorAll('input[type="tel"]').forEach(input => {
            input.addEventListener('input', function(e) {
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
            });
        });

        // Auto-format pincode
        document.querySelector('input[name="pincode"]').addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 6);
        });

        document.getElementById('customerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            clearErrors();
            hideSuccess();
            
            let isValid = true;

            // Customer Name
            const customerName = document.querySelector('input[name="customer_name"]');
            if (!validateRequired(customerName) || !validateText(customerName, 2, 100)) {
                showError(customerName, 'Name must be 2-100 letters/spaces only');
                isValid = false;
            }

            // Address Lines
            const address1 = document.querySelector('input[name="address1"]');
            if (!validateRequired(address1) || !validateMaxLength(address1, 255)) {
                showError(address1, 'Address is required (max 255 chars)');
                isValid = false;
            }

            const address2 = document.querySelector('input[name="address2"]');
            const address3 = document.querySelector('input[name="address3"]');
            if (address2.value && !validateMaxLength(address2, 255)) {
                showError(address2, 'Max 255 characters');
                isValid = false;
            }
            if (address3.value && !validateMaxLength(address3, 255)) {
                showError(address3, 'Max 255 characters');
                isValid = false;
            }

            // Location
            const location = document.querySelector('input[name="location"]');
            if (!validateRequired(location) || !validateLength(location, 2, 100)) {
                showError(location, 'Location must be 2-100 characters');
                isValid = false;
            }

            // City, State, Country
            const city = document.querySelector('input[name="city"]');
            const state = document.querySelector('input[name="state"]');
            if (!validateRequired(city) || !validateText(city, 2, 50)) {
                showError(city, 'City must be 2-50 letters/spaces only');
                isValid = false;
            }
            if (!validateRequired(state) || !validateText(state, 2, 50)) {
                showError(state, 'State must be 2-50 letters/spaces only');
                isValid = false;
            }

            // Pincode
            const pincode = document.querySelector('input[name="pincode"]');
            if (!validateRequired(pincode) || !validatePincode(pincode)) {
                showError(pincode, 'Must be exactly 6 digits');
                isValid = false;
            }

            // Mobile 1
            const mobile1 = document.querySelector('input[name="mobile1"]');
            if (!validateRequired(mobile1) || !validateMobile(mobile1)) {
                showError(mobile1, 'Must be exactly 10 digits');
                isValid = false;
            }

            // Mobile 2 (optional)
            const mobile2 = document.querySelector('input[name="mobile2"]');
            if (mobile2.value && !validateMobile(mobile2)) {
                showError(mobile2, 'Must be exactly 10 digits');
                isValid = false;
            }

            // Phone 1/2 (optional)
            const ph1 = document.querySelector('input[name="ph1"]');
            const ph2 = document.querySelector('input[name="ph2"]');
            if (ph1.value && !validatePhone(ph1)) {
                showError(ph1, 'Must be 10-12 digits');
                isValid = false;
            }
            if (ph2.value && !validatePhone(ph2)) {
                showError(ph2, 'Must be 10-12 digits');
                isValid = false;
            }

            // Email 1
            const email1 = document.querySelector('input[name="emailid1"]');
            if (!validateRequired(email1) || !validateEmail(email1)) {
                showError(email1, 'Enter a valid email address');
                isValid = false;
            }

            // Email 2 (optional)
            const email2 = document.querySelector('input[name="emailid2"]');
            if (email2.value && !validateEmail(email2)) {
                showError(email2, 'Enter a valid email address');
                isValid = false;
            }

            if (isValid) {
                // Form is valid - submit to API
                submitForm();
            }
        });

        // Validation Functions
        function validateRequired(field) {
            return field.value.trim() !== '';
        }

        function validateLength(field, min, max) {
            const value = field.value.trim();
            return value.length >= min && value.length <= max;
        }

        function validateText(field, min, max) {
            const value = field.value.trim();
            return /^[a-zA-Z\s]+$/.test(value) && validateLength(field, min, max);
        }

        function validateMaxLength(field, max) {
            return field.value.length <= max;
        }

        function validatePincode(field) {
            return /^\d{6}$/.test(field.value);
        }

        function validateMobile(field) {
            return /^\d{10}$/.test(field.value);
        }

        function validatePhone(field) {
            return /^\d{10,12}$/.test(field.value);
        }

        function validateEmail(field) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(field.value);
        }

        // Error Handling
        function showError(field, message) {
            field.style.borderColor = '#ef476f';
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = message;
            field.parentNode.appendChild(errorDiv);
        }

        function clearErrors() {
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.style.borderColor = '#e9ecef';
            });
            
            const errors = document.querySelectorAll('.error-message');
            errors.forEach(error => error.remove());
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            
            // Scroll to success message
            successDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function hideSuccess() {
            const successDiv = document.getElementById('successMessage');
            successDiv.style.display = 'none';
        }

        function submitForm() {
            // Get form data
            const formData = {
                customer_name: document.querySelector('input[name="customer_name"]').value,
                address1: document.querySelector('input[name="address1"]').value,
                address2: document.querySelector('input[name="address2"]').value,
                address3: document.querySelector('input[name="address3"]').value,
                location: document.querySelector('input[name="location"]').value,
                city: document.querySelector('input[name="city"]').value,
                state: document.querySelector('input[name="state"]').value,
                country: document.querySelector('input[name="country"]').value,
                pincode: document.querySelector('input[name="pincode"]').value,
                mobile1: document.querySelector('input[name="mobile1"]').value,
                mobile2: document.querySelector('input[name="mobile2"]').value,
                ph1: document.querySelector('input[name="ph1"]').value,
                ph2: document.querySelector('input[name="ph2"]').value,
                emailid1: document.querySelector('input[name="emailid1"]').value,
                emailid2: document.querySelector('input[name="emailid2"]').value
            };

            // Show loading state
            const submitBtn = document.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registering...';
            submitBtn.disabled = true;

            // Send to your API endpoint
            fetch('/api/users', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(formData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showSuccess(`Customer registered successfully! Customer ID: ${data.formatted_id}`);
                    document.getElementById('customerForm').reset();
                    
                    // Scroll to top to show success message
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    alert('Error: ' + data.message);
                }
            })
            .catch(error => {
                alert('Network error: ' + error);
            })
            .finally(() => {
                // Restore button state
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            });
        }

        // Enhanced mobile experience
        document.addEventListener('DOMContentLoaded', function() {
            // Add touch-friendly improvements for mobile
            if ('ontouchstart' in window) {
                document.querySelectorAll('input').forEach(input => {
                    input.style.fontSize = '16px'; // Prevent zoom on iOS
                });
            }
        });
    </script>
    <!-- Add this line to EVERY HTML page -->
<script src="{{ url_for('static', filename='js/navigation.js') }}"></script>
</body>
